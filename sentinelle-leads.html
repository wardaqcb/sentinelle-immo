<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinelle Immo — Leads DPE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0B1628; --navy2: #112040; --navy3: #0d1c36;
    --gold: #C9A96E; --gold2: #E8C98A; --gold3: rgba(201,169,110,0.12);
    --sidebar: 260px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: #fff; display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar); flex-shrink: 0; background: var(--navy3); border-right: 1px solid rgba(201,169,110,0.1); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
  .sidebar-logo { padding: 28px 24px 24px; border-bottom: 1px solid rgba(201,169,110,0.1); }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; color: var(--gold2); letter-spacing: 0.04em; }
  .logo span { color: rgba(255,255,255,0.5); font-weight: 300; }
  .logo-sub { font-size: 0.7rem; color: rgba(255,255,255,0.25); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 16px; margin: 2px 8px; border-radius: 6px; cursor: pointer; font-size: 0.875rem; color: rgba(255,255,255,0.5); transition: all 0.15s; text-decoration: none; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
  .nav-item.active { background: var(--gold3); color: var(--gold2); }
  .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
  .sidebar-section { padding: 20px 16px 8px; font-size: 0.65rem; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.12em; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid rgba(201,169,110,0.1); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--gold3); border: 1px solid rgba(201,169,110,0.3); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--gold2); font-weight: 600; }
  .user-name { font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,0.8); }
  .user-plan { font-size: 0.7rem; color: var(--gold); }

  /* MAIN */
  .main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--navy3); border-bottom: 1px solid rgba(201,169,110,0.1); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
  .topbar-left h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; }
  .topbar-left p { font-size: 0.8rem; color: rgba(255,255,255,0.35); margin-top: 2px; }

  /* FILTRES */
  .filters-bar { padding: 16px 32px; background: var(--navy2); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .search-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 9px 16px; border-radius: 8px; font-size: 0.85rem; font-family: 'DM Sans', sans-serif; outline: none; width: 280px; transition: border-color 0.15s; }
  .search-input:focus { border-color: rgba(201,169,110,0.4); }
  .search-input::placeholder { color: rgba(255,255,255,0.25); }
  .filter-btn { padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); background: transparent; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
  .filter-btn.active { background: var(--gold3); border-color: rgba(201,169,110,0.35); color: var(--gold2); }
  .filter-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; }
  .filter-select option { background: var(--navy2); }
  .results-count { margin-left: auto; font-size: 0.8rem; color: rgba(255,255,255,0.3); }

  /* TABLE */
  .content { padding: 24px 32px; flex: 1; }
  .leads-table { width: 100%; border-collapse: collapse; }
  .leads-table th { text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); font-weight: 500; }
  .leads-table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.85rem; vertical-align: middle; }
  .leads-table tr:hover td { background: rgba(255,255,255,0.03); cursor: pointer; }
  .dpe-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 5px; font-weight: 700; font-size: 0.85rem; }
  .dpe-G { background: rgba(239,68,68,0.2); color: #f87171; }
  .dpe-F { background: rgba(249,115,22,0.2); color: #fb923c; }
  .dpe-E { background: rgba(234,179,8,0.2); color: #fbbf24; }
  .adresse-cell { color: rgba(255,255,255,0.9); font-weight: 500; }
  .commune-cell { color: rgba(255,255,255,0.5); font-size: 0.8rem; }
  .surface-cell { color: rgba(255,255,255,0.6); }
  .plu-cell { font-size: 0.75rem; color: var(--gold); background: var(--gold3); padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .sci-cell { font-size: 0.78rem; color: rgba(255,255,255,0.4); }
  .signal-cell { font-size: 0.72rem; color: rgba(255,255,255,0.35); max-width: 200px; }
  .action-btn { padding: 5px 12px; border-radius: 5px; font-size: 0.75rem; cursor: pointer; border: 1px solid rgba(201,169,110,0.3); color: var(--gold); background: var(--gold3); font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .action-btn:hover { background: rgba(201,169,110,0.2); }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 24px 0 40px; }
  .page-btn { width: 36px; height: 36px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); background: transparent; cursor: pointer; font-size: 0.85rem; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .page-btn:hover { border-color: rgba(201,169,110,0.3); color: var(--gold2); }
  .page-btn.active { background: var(--gold3); border-color: rgba(201,169,110,0.4); color: var(--gold2); font-weight: 600; }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-info { font-size: 0.82rem; color: rgba(255,255,255,0.3); padding: 0 8px; }

  /* DETAIL PANEL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; display: none; }
  .overlay.show { display: block; }
  .detail-panel { position: fixed; right: -480px; top: 0; bottom: 0; width: 460px; background: var(--navy2); border-left: 1px solid rgba(201,169,110,0.15); z-index: 70; transition: right 0.3s ease; display: flex; flex-direction: column; overflow-y: auto; }
  .detail-panel.open { right: 0; }
  .detail-header { padding: 20px 24px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: space-between; }
  .detail-close { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
  .detail-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .detail-body { padding: 20px 24px; flex: 1; }
  .detail-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
  .detail-adresse { font-size: 0.85rem; color: rgba(255,255,255,0.45); margin-bottom: 20px; }
  .detail-section { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.25); margin: 18px 0 10px; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.84rem; }
  .detail-row-label { color: rgba(255,255,255,0.4); }
  .detail-row-value { color: rgba(255,255,255,0.85); font-weight: 500; text-align: right; max-width: 55%; }
  .detail-signal { margin-top: 16px; padding: 12px 14px; background: rgba(201,169,110,0.07); border: 1px solid rgba(201,169,110,0.15); border-radius: 8px; font-size: 0.82rem; color: var(--gold2); line-height: 1.6; }
  .detail-actions { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; gap: 10px; }
  .detail-btn { padding: 11px 18px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; font-weight: 500; }
  .detail-btn-primary { background: var(--gold); color: var(--navy); }
  .detail-btn-primary:hover { background: var(--gold2); }
  .detail-btn-secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); }
  .detail-btn-secondary:hover { background: rgba(255,255,255,0.1); }

  .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.25); font-size: 0.9rem; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo">Sentinelle<span>Immo</span></div>
    <div class="logo-sub">Veille · Temps réel</div>
  </div>
  <div style="padding: 8px 0;">
    <div class="sidebar-section">Navigation</div>
    <a class="nav-item" href="sentinelle-dashboard.html"><span class="icon">📡</span> Alertes</a>
    <a class="nav-item active" href="#"><span class="icon">🔥</span> Leads DPE</a>
    <a class="nav-item" href="sentinelle-marche.html"><span class="icon">📊</span> Marché local</a>
    <a class="nav-item" href="sentinelle-dossiers.html"><span class="icon">🗂️</span> Mes dossiers</a>
    <a class="nav-item" href="sentinelle-zones.html"><span class="icon">⚙️</span> Mes zones</a>
  </div>
  <div class="sidebar-bottom">
    <div class="avatar">JD</div>
    <div>
      <div class="user-name">Jean Dupont</div>
      <div class="user-plan">✦ Abonnement Pro</div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Leads DPE</h1>
      <p id="leads-subtitle">Chargement...</p>
    </div>
  </div>

  <div class="filters-bar">
    <input class="search-input" type="text" id="search" placeholder="🔍  Rechercher par adresse, commune, SCI..." oninput="applyFilters()">
    <button class="filter-btn active" onclick="setDpe('all',this)">Tous</button>
    <button class="filter-btn" onclick="setDpe('G',this)" style="color:#f87171;border-color:rgba(248,113,113,0.3)">Classe G</button>
    <button class="filter-btn" onclick="setDpe('F',this)" style="color:#fb923c;border-color:rgba(249,115,22,0.3)">Classe F</button>
    <select class="filter-select" id="commune-filter" onchange="applyFilters()">
      <option value="">Toutes les communes</option>
    </select>
    <select class="filter-select" id="sort-filter" onchange="applyFilters()">
      <option value="dpe">Trier : DPE (G en premier)</option>
      <option value="surface">Trier : Surface (grande en premier)</option>
      <option value="recent">Trier : Date détection</option>
    </select>
    <span class="results-count" id="results-count"></span>
  </div>

  <div class="content">
    <table class="leads-table">
      <thead>
        <tr>
          <th>DPE</th>
          <th>Adresse</th>
          <th>Commune</th>
          <th>Surface</th>
          <th>Type</th>
          <th>Zone PLU</th>
          <th>Propriétaire / SCI</th>
          <th>Signal</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="leads-tbody"></tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">Aucun lead ne correspond à votre recherche.</div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div id="dp-dpe"></div>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="dp-body"></div>
  <div class="detail-actions">
    <button class="detail-btn detail-btn-primary" id="dp-pappers">🔍 Voir la SCI sur Pappers</button>
    <button class="detail-btn detail-btn-secondary" onclick="closeDetail()">🗂️ Ajouter à mes dossiers</button>
  </div>
</div>

<script>
let ALL_LEADS = [];
let filtered = [];
let currentPage = 1;
const PER_PAGE = 50;
let activeDpe = 'all';

async function init() {
  const r = await fetch('donnees/leads_triple.json');
  ALL_LEADS = await r.json();

  // Dédoublonner par adresse + commune
  const seen = new Set();
  ALL_LEADS = ALL_LEADS.filter(l => {
    const key = (l.adresse || '') + '|' + (l.commune || '');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Remplir le filtre communes
  const communes = [...new Set(ALL_LEADS.map(l => l.commune).filter(Boolean))].sort();
  const sel = document.getElementById('commune-filter');
  communes.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });

  const nbG = ALL_LEADS.filter(l => l.etiquette_dpe === 'G').length;
  const nbF = ALL_LEADS.filter(l => l.etiquette_dpe === 'F').length;
  document.getElementById('leads-subtitle').textContent =
    ALL_LEADS.length.toLocaleString('fr-FR') + ' leads · ' + nbG + ' classe G · ' + nbF + ' classe F';

  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const commune = document.getElementById('commune-filter').value;
  const sort = document.getElementById('sort-filter').value;

  filtered = ALL_LEADS.filter(l => {
    if (activeDpe !== 'all' && l.etiquette_dpe !== activeDpe) return false;
    if (commune && l.commune !== commune) return false;
    if (search) {
      const hay = ((l.adresse||'') + ' ' + (l.commune||'') + ' ' + (l.sci_denomination||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Tri
  if (sort === 'dpe') {
    filtered.sort((a,b) => (a.etiquette_dpe === 'G' ? -1 : b.etiquette_dpe === 'G' ? 1 : 0));
  } else if (sort === 'surface') {
    filtered.sort((a,b) => (b.surface || 0) - (a.surface || 0));
  } else if (sort === 'recent') {
    filtered.sort((a,b) => (b.date_detection || '').localeCompare(a.date_detection || ''));
  }

  currentPage = 1;
  document.getElementById('results-count').textContent = filtered.length.toLocaleString('fr-FR') + ' résultats';
  render();
}

function setDpe(dpe, el) {
  activeDpe = dpe;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function render() {
  const tbody = document.getElementById('leads-tbody');
  tbody.innerHTML = '';
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);

  document.getElementById('empty-state').style.display = page.length ? 'none' : 'block';

  page.forEach(l => {
    const dpe = l.etiquette_dpe || '';
    const tr = document.createElement('tr');
    tr.onclick = () => openDetail(l);
    tr.innerHTML = `
      <td><span class="dpe-badge dpe-${dpe}">${dpe}</span></td>
      <td class="adresse-cell">${l.adresse || '—'}</td>
      <td class="commune-cell">${l.commune || '—'}</td>
      <td class="surface-cell">${l.surface ? l.surface + ' m²' : '—'}</td>
      <td class="commune-cell">${l.type_batiment || '—'}</td>
      <td>${l.zone_plu ? '<span class="plu-cell">' + l.zone_plu + '</span>' : '—'}</td>
      <td class="sci-cell">${l.sci_denomination || '—'}</td>
      <td class="signal-cell">${l.signal || '—'}</td>
      <td><button class="action-btn" onclick="event.stopPropagation();openDetail(this.closest('tr').__lead)">Voir →</button></td>`;
    tr.querySelector('.action-btn').__lead = l;
    tr.__lead = l;
    tbody.appendChild(tr);
  });

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  if (total <= 1) return;

  const addBtn = (label, page, disabled, active) => {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (active ? ' active' : '');
    btn.textContent = label;
    btn.disabled = disabled;
    btn.onclick = () => { currentPage = page; render(); window.scrollTo(0,0); };
    pag.appendChild(btn);
  };

  addBtn('←', currentPage - 1, currentPage === 1, false);

  let pages = [];
  if (total <= 7) {
    pages = Array.from({length: total}, (_,i) => i+1);
  } else {
    pages = [1];
    if (currentPage > 3) pages.push('...');
    for (let i = Math.max(2, currentPage-1); i <= Math.min(total-1, currentPage+1); i++) pages.push(i);
    if (currentPage < total - 2) pages.push('...');
    pages.push(total);
  }

  pages.forEach(p => {
    if (p === '...') {
      const span = document.createElement('span');
      span.className = 'page-info';
      span.textContent = '…';
      pag.appendChild(span);
    } else {
      addBtn(p, p, false, p === currentPage);
    }
  });

  addBtn('→', currentPage + 1, currentPage === total, false);

  const info = document.createElement('span');
  info.className = 'page-info';
  info.textContent = `Page ${currentPage}/${total}`;
  pag.appendChild(info);
}

function openDetail(l) {
  const dpe = l.etiquette_dpe || '';
  const dpeColors = {G:'#f87171', F:'#fb923c', E:'#fbbf24'};
  document.getElementById('dp-dpe').innerHTML =
    `<span class="dpe-badge dpe-${dpe}" style="width:auto;padding:4px 12px;font-size:0.9rem">Classe DPE ${dpe}</span>`;

  let html = `<div class="detail-title">${l.adresse || 'Adresse inconnue'}</div>`;
  html += `<div class="detail-adresse">📍 ${l.commune || ''} · ${l.type_batiment || ''} · ${l.surface ? l.surface + ' m²' : ''}</div>`;

  html += '<div class="detail-section">Informations DPE</div>';
  [
    ['Classe DPE', dpe],
    ['Surface', l.surface ? l.surface + ' m²' : ''],
    ['Type de bâtiment', l.type_batiment || ''],
    ['Date DPE', l.date_dpe || ''],
    ['Statut', l.statut_croisement || ''],
  ].filter(r=>r[1]).forEach(([k,v]) => {
    html += `<div class="detail-row"><span class="detail-row-label">${k}</span><span class="detail-row-value">${v}</span></div>`;
  });

  html += '<div class="detail-section">Zone PLU</div>';
  [
    ['Code zone', l.zone_plu || ''],
    ['Libellé', l.zone_plu_long || ''],
    ['Type', l.zone_plu_type || ''],
  ].filter(r=>r[1]).forEach(([k,v]) => {
    html += `<div class="detail-row"><span class="detail-row-label">${k}</span><span class="detail-row-value">${v}</span></div>`;
  });

  if (l.sci_denomination) {
    html += '<div class="detail-section">Propriétaire / SCI</div>';
    [
      ['Dénomination', l.sci_denomination || ''],
      ['SIREN', l.sci_siren || ''],
    ].filter(r=>r[1]).forEach(([k,v]) => {
      html += `<div class="detail-row"><span class="detail-row-label">${k}</span><span class="detail-row-value">${v}</span></div>`;
    });
  }

  html += '<div class="detail-section">Signal détecté</div>';
  html += `<div class="detail-signal">${l.signal || ''}<br><small style="opacity:0.6">Détecté le ${l.date_detection || ''} · Source : ${l.source || ''}</small></div>`;

  document.getElementById('dp-body').innerHTML = html;

  const pappersBtn = document.getElementById('dp-pappers');
  if (l.pappers_url) {
    pappersBtn.style.display = 'block';
    pappersBtn.onclick = () => window.open(l.pappers_url, '_blank');
  } else {
    pappersBtn.style.display = 'none';
  }

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

init();
</script>
</body>
</html>
